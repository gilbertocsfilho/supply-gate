POLICY_VERSION="1.0.0"
DEFAULT_MODE="soft"

STATE_DIR_NAME="supply-chain-protect"
LOG_RETENTION_DAYS="30"

NODE_COOLDOWN_MINUTES="10080"
BUN_COOLDOWN_SECONDS="604800"

MANAGED_COMMANDS="npm pnpm yarn bun pip uv poetry cargo go claude gemini codex"
PACKAGE_MANAGERS="npm pnpm yarn bun pip uv poetry cargo go"
AI_COMMANDS="claude gemini codex"

# Hard-mode values must be customized before rollout.
NPM_REGISTRY_URL="https://registry.example.corp/npm/"
PYTHON_INDEX_URL="https://registry.example.corp/pypi/simple/"
CARGO_REGISTRY_URL="sparse+https://registry.example.corp/crates/"
GO_PROXY_URL="https://registry.example.corp/goproxy/"
GO_SUMDB="sum.golang.org"
GO_PRIVATE_PATTERNS=""
GO_NO_SUMDB_PATTERNS=""
GO_VCS_RULES="public:off,private:git|ssh"

# AI jail backends:
# - maclinux-custom: executable launcher script receives REAL_BIN then remaining args
# - windows-wsl: invokes a WSL command wrapper
# - windows-sandbox: placeholder policy gate; operator must provide launcher
AI_JAIL_BACKEND_MACLINUX="maclinux-custom"
AI_JAIL_BACKEND_WINDOWS="windows-wsl"
AI_JAIL_LAUNCHER_MACLINUX=""
AI_JAIL_LAUNCHER_WINDOWS=""

SCFW_AUTO_WRAP="1"
SCFW_MANAGED_TOOLS="npm pip poetry"

INSTALL_ROOT_OVERRIDE=""
CONFIG_ROOT_OVERRIDE=""
